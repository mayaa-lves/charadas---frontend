<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Modo Desafio | O que é, o que é?</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;900&display=swap" rel="stylesheet">
    <style>
        h1 { font-family: 'Luckiest Guy', cursive; }
        body { font-family: 'Poppins', sans-serif; }
        
        .bg-pattern {
            background-color: #4c1d95;
            background-image: radial-gradient(#6d28d9 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            animation: move-bg 10s linear infinite;
        }

        @keyframes move-bg {
            from { background-position: 0 0; }
            to { background-position: 60px 60px; }
        }

        .card-shadow {
            box-shadow: 0 20px 0px #2e1065;
        }
    </style>
</head>
<body class="bg-pattern flex flex-col items-center justify-center min-h-screen p-4 overflow-hidden">

    <div class="mb-6 flex items-center gap-4 bg-black/30 px-6 py-2 rounded-full border-2 border-white/20">
        <span class="text-white font-black uppercase tracking-widest">Vidas:</span>
        <div id="vidas-container" class="flex gap-1 text-2xl">
            ❤️ ❤️ ❤️ ❤️ ❤️
        </div>
    </div>

    <h1 class="text-5xl md:text-7xl text-cyan-400 mb-8 tracking-widest drop-shadow-[0_6px_0_rgba(0,0,0,0.5)]">
        DESAFIO!
    </h1>

    <div class="w-full max-w-md h-[450px] relative">
        <div class="w-full h-full bg-white rounded-3xl p-8 flex flex-col items-center justify-between border-[6px] border-cyan-400 card-shadow">
            
            <div class="text-center">
                <span class="bg-indigo-100 text-indigo-600 px-4 py-1 rounded-full text-xs font-black uppercase">Dica da Charada</span>
                <p id="pergunta-desafio" class="mt-4 text-xl font-black text-indigo-900 leading-tight uppercase">
                    Carregando desafio...
                </p>
            </div>

            <div id="palavra-container" class="flex flex-wrap justify-center gap-2 my-6">
                <span class="w-8 h-10 border-b-4 border-indigo-900 flex items-center justify-center text-2xl font-black text-indigo-900">?</span>
            </div>

            <input type="text" id="input-mobile" class="opacity-0 absolute -z-10" autofocus>

            <button id="btn-adivinhar" class="group relative w-full">
                <span class="absolute top-0 left-0 w-full h-full mt-1 ml-1 bg-black rounded-xl"></span>
                <span class="relative block w-full py-3 bg-yellow-400 border-2 border-black text-indigo-900 font-black rounded-xl transition-all group-hover:-translate-x-1 group-hover:-translate-y-1">
                    ADIVINHAR AGORA! 💡
                </span>
            </button>
        </div>
    </div>

    <a href="index.html" class="mt-12 text-white/50 hover:text-white font-bold transition-colors uppercase tracking-widest text-sm border-b border-transparent hover:border-white">
        ← Voltar para o Início
    </a>

    <script src="desafio.js"></script>

    </body>
</html>
