<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gerador de Charadas | API com JS</title>
    <link rel="icon" type="image/x-icon" href="icon.icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;900&display=swap" rel="stylesheet">
    <style>
        h1 { font-family: 'Luckiest Guy', cursive; }
        body { font-family: 'Poppins', sans-serif; }
        
        .bg-pattern {
            background-color: #4c1d95;
            background-image: radial-gradient(#6d28d9 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            animation: move-bg 10s linear infinite;
        }

        @keyframes move-bg {
            from { background-position: 0 0; }
            to { background-position: 60px 60px; }
        }

        .card-shadow {
            box-shadow: 0 20px 0px #2e1065;
        }
        
        .flip-card-active { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-pattern flex flex-col items-center justify-center min-h-screen p-4 overflow-hidden">

    <h1 class="text-6xl md:text-8xl text-yellow-400 mb-10 tracking-widest drop-shadow-[0_8px_0_rgba(0,0,0,0.5)] transition-transform hover:scale-110 cursor-default">
        CHARADA!
    </h1>

    <div class="group w-full max-w-sm [perspective:1000px] h-72">
        <div id="card-inner" class="relative w-full h-full transition-all duration-500 [transform-style:preserve-3d] cursor-pointer card-shadow rounded-3xl active:scale-95"> 
            
            <div class="absolute inset-0 [backface-visibility:hidden] bg-white rounded-3xl flex flex-col items-center justify-center p-8 text-center border-[6px] border-yellow-400">
                <div class="absolute -top-5 bg-pink-500 text-white px-6 py-1 rounded-full font-black italic shadow-lg -rotate-3">
                    VALENDO!
                </div>

                <p id="pergunta" class="text-2xl font-black text-indigo-900 leading-tight uppercase">
                    Preparado para o desafio?
                </p>

                <div class="absolute bottom-6 animate-bounce bg-indigo-100 p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                    </svg>
                </div>
            </div>

            <div class="absolute inset-0 [backface-visibility:hidden] bg-yellow-400 rounded-3xl flex flex-col items-center justify-center p-8 text-center text-indigo-900 [transform:rotateY(180deg)] border-[6px] border-white">
                <span class="text-sm font-black uppercase tracking-tighter opacity-70">A resposta é...</span>
                <p id="resposta" class="text-4xl font-black mt-2 drop-shadow-sm"></p>
                <div class="absolute bottom-4 right-4 text-4xl grayscale opacity-20">💥</div>
            </div>

        </div>
    </div>


    <div class="flex items-center gap-4 mt-14"> 
    
        <button id="btn-nova" class="relative group">
            <span class="absolute top-0 left-0 w-full h-full mt-1 ml-1 bg-black rounded-2xl"></span>
            <span class="relative inline-block w-full h-full px-12 py-5 bg-pink-500 border-2 border-black text-white font-black text-xl rounded-2xl transition-all group-hover:-translate-x-1 group-hover:-translate-y-1 group-active:translate-x-0 group-active:translate-y-0 uppercase tracking-wider">
                Nova Charada 🎲
            </span>
        </button>

        <a href="desafio.html" class="relative group flex-shrink-0" title="Modo Desafio">
            <span class="absolute top-0 left-0 w-full h-full mt-1 ml-1 bg-black rounded-full"></span>
            <span class="relative flex items-center justify-center w-16 h-16 bg-cyan-400 border-2 border-black text-2xl rounded-full transition-all group-hover:-translate-x-1 group-hover:-translate-y-1 group-active:translate-x-0 group-active:translate-y-0">
                🏆
            </span>
        </a>

    </div>
    

    <div class="mt-10 flex gap-2">
        <div class="w-3 h-3 rounded-full bg-yellow-400 animate-ping"></div>
        <div class="w-3 h-3 rounded-full bg-pink-500 animate-ping [animation-delay:0.2s]"></div>
        <div class="w-3 h-3 rounded-full bg-cyan-400 animate-ping [animation-delay:0.4s]"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
